name: Radar e Aprovações do Portal

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: portal-radar
  cancel-in-progress: false

jobs:
  radar:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Buscar notícias novas
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: node scripts/radar-portal.js

      - name: Processar aprovações do Telegram
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: node scripts/processar-telegram.js

      - name: Salvar mudanças
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data posts scripts assets index.html post.html styles.css package.json README.md
          git diff --cached --quiet || git commit -m "Atualizar portal automaticamente"
          git push

      - name: Preparar Pages
        uses: actions/configure-pages@v5

      - name: Enviar site para publicação
        uses: actions/upload-pages-artifact@v3
        with:
          path: "."

      - name: Publicar site
        uses: actions/deploy-pages@v4
